apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-backend
  labels:
    app: backend
    release: {{ .Release.Name }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
        release: {{ .Release.Name }}
    spec:
      containers:
        - name: backend
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: 3000

          env:
            - name: MONGO_URI
              value: {{ .Values.env.mongoUri }}
            - name: PORT
              value: {{ .Values.env.port | quote }}

          resources:
            requests:
              cpu: {{ .Values.resources.requests.cpu }}
              memory: {{ .Values.resources.requests.memory }}
            limits:
              cpu: {{ .Values.resources.limits.cpu }}
              memory: {{ .Values.resources.limits.memory }}

          # Startup probe — gives slow containers time to boot
          # liveness won't run until this passes
          # startupProbe:
          # httpGet:
          # path: {{ .Values.probes.startup.path }}
           #   port: 3000
            #failureThreshold: {{ .Values.probes.startup.failureThreshold }}
            #periodSeconds: {{ .Values.probes.startup.periodSeconds }}

          # Liveness probe — restarts container if it becomes unresponsive
          #livenessProbe:
           # httpGet:
            #  path: {{ .Values.probes.liveness.path }}
             # port: 3000
            #initialDelaySeconds: {{ .Values.probes.liveness.initialDelaySeconds }}
            #periodSeconds: {{ .Values.probes.liveness.periodSeconds }}
            #failureThreshold: {{ .Values.probes.liveness.failureThreshold }}

          # Readiness probe — removes pod from service if DB is not connected
          #readinessProbe:
           # httpGet:
            #  path: {{ .Values.probes.readiness.path }}
             # port: 3000
            #initialDelaySeconds: {{ .Values.probes.readiness.initialDelaySeconds }}
            #periodSeconds: {{ .Values.probes.readiness.periodSeconds }}
            #failureThreshold: {{ .Values.probes.readiness.failureThreshold }}
