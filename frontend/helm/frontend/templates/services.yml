apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-frontend-svc
  labels:
    app: frontend
    release: {{ .Release.Name }}
spec:
  type: {{ .Values.service.type }}
  selector:
    app: frontend
  ports:
    - name: http
      protocol: TCP
      port: {{ .Values.service.port }}
      targetPort: {{ .Values.service.targetPort }}